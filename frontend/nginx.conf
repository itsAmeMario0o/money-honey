# Nginx config for the built React SPA.
# Caddy handles TLS and /api routing, so this only serves static files
# and falls back to index.html for client-side routes.

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-lived cache for hashed assets
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
