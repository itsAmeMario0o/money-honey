# Build + push app and frontend images to GHCR.
# Runs on every push to main and every PR targeting main.
#
# Auth: uses the built-in GITHUB_TOKEN with `packages: write` permission.
# No personal access tokens. No long-lived secrets.

name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - app/**
      - frontend/**
  pull_request:
    branches: [main]
    paths:
      - app/**
      - frontend/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    name: Build app (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-app:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-app:${{ github.ref_name == 'main' && 'latest' || 'pr' }}

  build-frontend:
    name: Build frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-frontend:${{ github.ref_name == 'main' && 'latest' || 'pr' }}

  notify:
    name: Webex notification
    needs: [build-backend, build-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Webex message
        if: ${{ secrets.WEBEX_BOT_TOKEN != '' }}
        uses: chrivand/action-webex-js@b75da3c89c7e9d5f18abdf9de472cbc8f2c20f14
        with:
          token: ${{ secrets.WEBEX_BOT_TOKEN }}
          roomId: ${{ secrets.WEBEX_ROOM_ID }}
          message: |
            **docker-build** on `${{ github.ref_name }}`
            Backend: ${{ needs.build-backend.result }} · Frontend: ${{ needs.build-frontend.result }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
