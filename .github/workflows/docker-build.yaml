# Build + scan + push app and frontend images to GHCR.
# Runs on every push to main and every PR targeting main.
#
# Flow per service: build locally (load=true, no push) -> Trivy image
# scan -> on pass, push to GHCR. Fails HIGH/CRITICAL vulns before the
# image is ever visible in the registry.
#
# Auth: uses the built-in GITHUB_TOKEN with `packages: write` permission.
# No personal access tokens. No long-lived secrets.

name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - app/**
      - frontend/**
  pull_request:
    branches: [main]
    paths:
      - app/**
      - frontend/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase repo names. github.repository_owner preserves
  # case ("itsAmeMario0o"), so we compute IMAGE_OWNER per job in a setup
  # step that lowercases it via tr.

jobs:
  build-backend:
    name: Build + scan + push app (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stage 1: build locally, load into Docker daemon (no push yet).
      - name: Build backend image (local only)
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: money-honey-app:ci-scan

      # Stage 2: scan the locally-built image. Fails HIGH + CRITICAL.
      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          # Authenticated GitHub API calls — prevents rate-limited
          # downloads of the Trivy binary + DB from GitHub releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: money-honey-app:ci-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      # Stage 3: if scan passed, re-tag + push to GHCR.
      - name: Push backend image (post-scan)
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          cache-from: type=gha
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-app:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-app:${{ github.ref_name == 'main' && 'latest' || 'pr' }}

  build-frontend:
    name: Build + scan + push frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image (local only)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: money-honey-frontend:ci-scan

      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: money-honey-frontend:ci-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push frontend image (post-scan)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          cache-from: type=gha
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/money-honey-frontend:${{ github.ref_name == 'main' && 'latest' || 'pr' }}

  notify:
    name: Webex notification
    needs: [build-backend, build-frontend]
    if: always()
    runs-on: ubuntu-latest
    # Hoist secrets into job env so the step-level `if` can read them.
    # `secrets.*` is NOT allowed in step `if` expressions per GitHub's
    # workflow validator; `env.*` is. Empty if the secret is unset.
    env:
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
    steps:
      - name: Send Webex message
        if: env.WEBEX_BOT_TOKEN != ''
        uses: chrivand/action-webex-js@b75da3c89c7e9d5f18abdf9de472cbc8f2c20f14
        with:
          token: ${{ env.WEBEX_BOT_TOKEN }}
          roomId: ${{ env.WEBEX_ROOM_ID }}
          message: |
            **docker-build** on `${{ github.ref_name }}`
            Backend: ${{ needs.build-backend.result }} · Frontend: ${{ needs.build-frontend.result }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
