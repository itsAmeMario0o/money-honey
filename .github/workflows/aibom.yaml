# AI supply-chain scan — produces a CycloneDX SBOM for each service.
#
# Cisco's public AIBOM repo (cisco-ai-defense/aibom) is a spec/schema
# rather than a runnable CLI, so our original `python -m aibom` approach
# didn't work. This workflow stands in with syft via anchore/sbom-action:
# same outcome (machine-readable manifest of every dependency including
# AI/ML libs), in an industry-standard CycloneDX format. When the Cisco
# CLI ships, swap the two steps below for the vendor tool.

name: AI BOM (AI supply chain)

on:
  pull_request:
    branches: [main]
    paths:
      - app/**
      - frontend/**
      - docs/specs/**

permissions:
  contents: read
  pull-requests: write

jobs:
  sbom:
    name: Generate CycloneDX SBOM (app + frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM for app (Python backend)
        uses: anchore/sbom-action@v0.17.9
        with:
          path: app
          format: cyclonedx-json
          output-file: sbom-app.cdx.json
          upload-artifact: false

      - name: Generate SBOM for frontend (Node)
        uses: anchore/sbom-action@v0.17.9
        with:
          path: frontend
          format: cyclonedx-json
          output-file: sbom-frontend.cdx.json
          upload-artifact: false

      - name: Highlight AI / ML components
        # Simple grep for well-known AI/ML library names across both
        # SBOMs; useful in PR summaries even before any formal policy
        # enforcement lands.
        run: |
          set -eu
          echo "## 🤖 AI/ML components detected" > aibom-summary.md
          echo "" >> aibom-summary.md
          echo '```' >> aibom-summary.md
          if grep -hE "(langchain|anthropic|sentence-transformers|faiss|transformers|openai|huggingface|torch|numpy)" \
                sbom-app.cdx.json sbom-frontend.cdx.json 2>/dev/null \
                | sort -u | head -50 >> aibom-summary.md; then
            :
          else
            echo "(none detected)" >> aibom-summary.md
          fi
          echo '```' >> aibom-summary.md
          cat aibom-summary.md

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aibom-sboms
          path: |
            sbom-app.cdx.json
            sbom-frontend.cdx.json
            aibom-summary.md
          retention-days: 30
