# AI Bill of Materials via Cisco AI Defense `cisco-aibom` CLI.
#
# The tool inventories every AI asset in the repo: models, agents, tools,
# MCP servers/clients, embeddings, vector stores, datasets, prompts,
# guardrails, secrets, dependencies. Three-tier detection: deterministic
# scanner + cross-reference resolution + agentic LLM classifier.
#
# `--llm-model` is required. The AIBOM tool uses an LLM INTERNALLY as a
# classifier (eliminates false positives, enriches findings). This is a
# scoped, conscious exception to the project's "only Anthropic" principle:
# the tool-internal LLM is NOT the chatbot's LLM. Runtime app traffic
# stays Anthropic-only. See project_design_decisions.md for the rationale.
#
# Required secret: OPENAI_API_KEY (set at repo Settings -> Secrets -> Actions).
# If unset, the job runs but skips the scan with a clear notice rather
# than failing CI — flip the fail-closed behaviour once the secret lands.

name: AIBOM (Cisco AI Defense)

on:
  pull_request:
    branches: [main]
    paths:
      - app/**
      - frontend/**
      - docs/specs/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  aibom:
    name: cisco-aibom analyze
    runs-on: ubuntu-latest
    # Advisory until the operator provisions the OpenAI secret and the
    # scan has been validated against this repo's real output.
    continue-on-error: true
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Default model for the AIBOM tool's internal classifier. Cheap,
      # widely available, and accurate enough for component classification.
      AIBOM_LLM_MODEL: gpt-4o-mini
      AIBOM_LLM_PROVIDER: openai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip notice if OPENAI_API_KEY is unset
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "::warning title=AIBOM skipped::OPENAI_API_KEY secret is not set; Cisco AI Defense AIBOM classifier requires an LLM."
          echo "Set it at repo Settings -> Secrets and variables -> Actions."
          exit 0

      - name: Install uv
        if: env.OPENAI_API_KEY != ''
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: false

      - name: Install cisco-aibom
        if: env.OPENAI_API_KEY != ''
        run: |
          uv tool install --python 3.13 cisco-aibom
          uv tool run cisco-aibom --help | head -5

      - name: AIBOM — analyze app (backend)
        if: env.OPENAI_API_KEY != ''
        run: |
          uv tool run cisco-aibom analyze app \
            -o json -O aibom-app.json \
            --llm-model "$AIBOM_LLM_MODEL" \
            --llm-provider "$AIBOM_LLM_PROVIDER" \
            --llm-api-key "$OPENAI_API_KEY"

      - name: AIBOM — analyze frontend
        if: env.OPENAI_API_KEY != ''
        run: |
          uv tool run cisco-aibom analyze frontend \
            -o json -O aibom-frontend.json \
            --llm-model "$AIBOM_LLM_MODEL" \
            --llm-provider "$AIBOM_LLM_PROVIDER" \
            --llm-api-key "$OPENAI_API_KEY"

      - name: Summarise detected AI components
        if: env.OPENAI_API_KEY != ''
        run: |
          set -eu
          {
            echo "## 🤖 Cisco AI Defense AIBOM summary"
            echo ""
            for f in aibom-app.json aibom-frontend.json; do
              if [ -f "$f" ]; then
                echo "### $f"
                jq -r '.components[]? | "- \(.type): \(.name // .identifier // "unknown")"' "$f" 2>/dev/null \
                  | sort -u | head -40 \
                  || echo "(no components detected or jq parse failed)"
                echo ""
              fi
            done
          } > aibom-summary.md
          cat aibom-summary.md

      - name: Upload AIBOM reports
        if: env.OPENAI_API_KEY != '' && always()
        uses: actions/upload-artifact@v4
        with:
          name: aibom-reports
          path: |
            aibom-app.json
            aibom-frontend.json
            aibom-summary.md
          if-no-files-found: ignore
          retention-days: 30

  notify:
    name: Webex notification
    needs: [aibom]
    if: always()
    runs-on: ubuntu-latest
    env:
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
    steps:
      - name: Send Webex message
        if: env.WEBEX_BOT_TOKEN != ''
        run: |
          curl -sS -X POST https://webexapis.com/v1/messages \
            -H "Authorization: Bearer $WEBEX_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"roomId\":\"$WEBEX_ROOM_ID\",\"markdown\":\"🤖 **AIBOM scan** on \`${{ github.ref_name }}\`: ${{ needs.aibom.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
