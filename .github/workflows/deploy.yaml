# Deploy app, frontend, and Caddy manifests to AKS on every push to main.
#
# Scope-limited deliberately (FR-10 in cicd-v1.md spec): network
# policies, tracing policies, SecretProviderClass, observability
# workloads, and cloudflared all require human review — this workflow
# does NOT touch them.
#
# Auth: Azure OIDC federation via azure/login. No client secrets.
# See docs/specs/cicd-v1.md §3 for the repo-secrets list.

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - k8s/app/**
      - k8s/frontend/**
      - k8s/caddy/**
      - app/**
      - frontend/**
  # Allow a one-off manual trigger from the Actions UI. Handy for
  # verifying the SP + OIDC trust end-to-end without needing a real
  # code change or pre-built images.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC federation with Azure

env:
  AKS_RESOURCE_GROUP: money-honey-rg
  AKS_CLUSTER_NAME: money-honey-aks

jobs:
  deploy:
    name: kubectl apply app manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # AKS has Azure AD integration + Azure RBAC for Kubernetes.
      # Without kubelogin on the runner, kubectl can't resolve credentials.
      # use-kubelogin installs the binary and wires up the exec credential
      # plugin — keeps the SP on the minimum "Cluster User Role" tier.
      - name: Install kubelogin
        uses: azure/use-kubelogin@v1.3
        with:
          kubelogin-version: v0.2.17

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          admin: 'false'
          use-kubelogin: 'true'

      - name: Apply app manifests
        run: |
          kubectl apply -f k8s/app/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/caddy/

      - name: Wait for rollout
        run: |
          kubectl -n money-honey rollout status deployment/fastapi --timeout=15m
          kubectl -n money-honey rollout status deployment/react --timeout=5m
          kubectl -n money-honey rollout status deployment/caddy --timeout=5m

  notify:
    name: Webex notification
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    # secrets.* is not resolvable in step `if` expressions; hoist into
    # job env so `env.*` can be checked instead. Empty string if unset.
    env:
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
    steps:
      - name: Send Webex message
        if: env.WEBEX_BOT_TOKEN != ''
        run: |
          curl -sS -X POST https://webexapis.com/v1/messages \
            -H "Authorization: Bearer $WEBEX_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"roomId\":\"$WEBEX_ROOM_ID\",\"markdown\":\"**deploy** on \`${{ github.ref_name }}\` -> AKS money-honey-aks\nResult: ${{ needs.deploy.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
