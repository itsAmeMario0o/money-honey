# Code quality + test gate. Runs on every push and every PR against main.
# Pre-commit hook covers the same Python checks locally; this workflow
# is the backstop and is the only place where pytest + vitest run.

name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (types)
        run: mypy .

      - name: Pytest
        run: pytest -q

  typescript:
    name: TypeScript (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No npm cache: we don't commit a package-lock.json yet.
          # Add `cache: npm` + cache-dependency-path once we do.

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Vitest
        run: npm run test

  secret-scan:
    name: Secret + IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          soft_fail: false

  trivy-fs:
    name: Trivy — filesystem / dependency scan (blocking) + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan app/ and frontend/ dependencies (blocks HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          # Authenticated GitHub API calls prevent rate limits when the
          # action pulls the Trivy binary + vulnerability DB.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: "node_modules,.venv,.terraform,infra/private_key"

      # SBOM is a complement to — not a substitute for — the Cisco AIBOM
      # generated by aibom.yaml. Together they give us both a classic
      # Software Bill of Materials AND an AI-specific Bill of Materials
      # per the project's Layer 5 + Layer 6 story.
      - name: Generate CycloneDX SBOM (non-blocking)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: fs
          scan-ref: "."
          format: cyclonedx
          output: sbom.cdx.json
          skip-dirs: "node_modules,.venv,.terraform,infra/private_key"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: ignore
          retention-days: 30

  trivy-k8s:
    name: Trivy — k8s manifest scan (advisory, non-blocking for now)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Scan k8s/ manifests for misconfigurations
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scoped-ignore file at repo root. Each entry has a reason
          # and an expiredAt date so ignores don't become permanent
          # blind spots.
          TRIVY_IGNOREFILE: .trivyignore.yaml
        with:
          scan-type: config
          scan-ref: k8s
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          # Advisory only: this job is continue-on-error at the job
          # level too, so findings surface in logs without blocking
          # PRs. Flip to required after a baseline pass is established.

  notify:
    name: Webex notification (failure only)
    needs: [python, typescript, secret-scan, trivy-fs, trivy-k8s]
    if: failure()
    runs-on: ubuntu-latest
    env:
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
    steps:
      - name: Send Webex message
        if: env.WEBEX_BOT_TOKEN != ''
        run: |
          curl -sS -X POST https://webexapis.com/v1/messages \
            -H "Authorization: Bearer $WEBEX_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"roomId\":\"$WEBEX_ROOM_ID\",\"markdown\":\"❌ **Quality** failed on \`${{ github.ref_name }}\`\nPython: ${{ needs.python.result }} · TypeScript: ${{ needs.typescript.result }} · Secrets: ${{ needs.secret-scan.result }} · Trivy-FS: ${{ needs.trivy-fs.result }} · Trivy-K8s: ${{ needs.trivy-k8s.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
