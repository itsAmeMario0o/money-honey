# Pre-commit hooks for Money Honey.
#
# Install once per clone:
#   brew install pre-commit      # macOS, or pipx install pre-commit
#   pre-commit install           # wires the hook into .git/hooks/pre-commit
#
# After that, every `git commit` runs these checks on staged files.
# The hooks BLOCK the commit if any secret pattern or Terraform issue
# is found — catching the class of mistake where a subscription ID,
# API key, or insecure default slips in.

repos:
  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=5120"]  # 5 MB — blocks accidental model / PDF commits

  # Gitleaks — secret scanning for API keys, tokens, Azure IDs, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # tfsec — Terraform security scanner
  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.11
    hooks:
      - id: tfsec
        args: ["--soft-fail=false"]
