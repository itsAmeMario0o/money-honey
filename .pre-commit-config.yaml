# Pre-commit hooks for Money Honey.
#
# Install once per clone:
#   brew install pre-commit
#   pre-commit install
#
# Every `git commit` runs these on staged files.
# Frontend lint / typecheck / tests run in the CI workflow
# `.github/workflows/quality.yaml`, not here — they require node_modules
# which we don't want pre-commit to manage.

repos:
  # ---- Basic hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=5120"]

  # ---- Secret + IaC scanning ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.11
    hooks:
      - id: tfsec
        args: ["--soft-fail=false"]

  # ---- Python (app/) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^app/.*\.py$

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        files: ^app/.*\.py$
