# Trivy ignore file (structured format, Trivy >= 0.52).
# Scoped ignores only — never blanket-ignore a rule.

vulnerabilities:
  - id: CVE-2024-47874
    # starlette 0.38.6 (pulled in transitively by fastapi 0.115.0) has
    # a DoS vulnerability in multipart/form-data parsing. Our FastAPI
    # backend exposes only `/api/health` (GET) and `/api/chat` (POST,
    # application/json with a Pydantic ChatRequest). No endpoint
    # accepts multipart/form-data, so the vulnerable parser is never
    # invoked in our deployed surface.
    #
    # The fix is in starlette 0.40.0+ but fastapi 0.115.0 caps
    # starlette at <0.39.0. Real remediation = bump fastapi to a
    # version that allows starlette 0.40+ (likely 0.116+); planned
    # for v1.1 dependency sweep.
    expiredAt: "2026-12-31"

  - id: CVE-2026-34070
    # langchain-core 0.3.84 has a path-traversal vulnerability in the
    # legacy `load_prompt` function. Fix is in 1.2.22, which would
    # require migrating the entire langchain ecosystem from 0.3.x to
    # 1.x. We don't call `load_prompt` (or any langchain prompt-loading
    # helpers) anywhere in the codebase — `app/personality.py` defines
    # the system prompt as a Python string literal, and the chat path
    # in `app/main.py` constructs messages directly. Risk surface is
    # zero unless we adopt prompt-loading from disk in the future.
    #
    # Re-evaluate once we plan the langchain 0.3 -> 1.x migration in v2.
    expiredAt: "2026-12-31"

misconfigurations:
  - id: AVD-KSV-0109
    paths:
      - "otel/configmap.yaml"
    # Trivy flags any ConfigMap field named `token:`. OTel Collector's
    # splunk_hec exporter requires that exact field name per its
    # schema, so we can't rename it. The value is
    # `${file:/mnt/secrets/splunk-hec-token}`, which is an OTel
    # config-source expansion: the collector reads the token from a
    # CSI-mounted file at startup. No secret value ever lives in the
    # ConfigMap itself; only a filesystem-path reference does.
    #
    # Remediation path (would let us drop this ignore): upstream
    # splunk_hec exporter adds a top-level `token_file:` field, or OTel
    # adds schema-level support for file-source in any string field.
    # Tracked in roadmap.md under v2 Observability.
    expiredAt: "2027-04-15"
