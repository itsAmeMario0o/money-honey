# Caddyfile for the internal reverse proxy.
# Caddy is a ClusterIP Service reachable only from cloudflared pods
# (enforced by allow-cloudflared-to-caddy CNP). TLS is handled at the
# Cloudflare edge — here we serve plain HTTP on :80.
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: money-honey
  labels:
    app: caddy
    component: proxy
    part-of: money-honey
data:
  Caddyfile: |
    {
        # No admin API exposure inside the cluster.
        admin off
        auto_https off
    }

    :80 {
        # Security headers — belt-and-suspenders with Cloudflare's edge headers.
        header {
            -Server
            X-Frame-Options "DENY"
            X-Content-Type-Options "nosniff"
            Referrer-Policy "strict-origin-when-cross-origin"
            Content-Security-Policy "default-src 'self'; connect-src 'self'"
        }

        # API requests go to FastAPI; everything else goes to the React SPA.
        reverse_proxy /api/* fastapi:8000
        reverse_proxy /* react:3000
    }
