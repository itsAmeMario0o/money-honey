# SecretProviderClass for the Azure Key Vault CSI driver.
# Maps 4 KV secrets into files under /mnt/secrets/ inside pods that
# reference this class via their volume spec.
#
# Identity: the azurekeyvaultsecretsprovider AKS add-on creates a
# User-Assigned Managed Identity whose client ID is baked in below.
# NOT a secret — it's a public Azure identifier. Regenerate with:
#   az aks show -g money-honey-rg -n money-honey-aks \
#     --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: money-honey-secrets
  namespace: money-honey
  labels:
    app: money-honey
    component: secrets
    part-of: money-honey
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: e4bd36bc-e409-447a-909e-9766114f9bb7
    keyvaultName: mh-kv-w8fxwb
    # tenantId is auto-discovered from the AKS-managed identity; omit
    # here to keep the tenant ID out of git history. Override with the
    # `tenantId` parameter if you need to target a non-default tenant.
    objects: |
      array:
        - |
          objectName: anthropic-api-key
          objectType: secret
        - |
          objectName: splunk-hec-token
          objectType: secret
        - |
          objectName: cloudflare-tunnel-chatbot-token
          objectType: secret
  # Sync the KV secrets into Kubernetes Secret objects too, so env-var-style
  # consumption is possible (as well as file-mount). Each entry below
  # creates a K8s Secret that can be referenced via envFrom / env.
  secretObjects:
    - secretName: app-api-keys
      type: Opaque
      data:
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
    - secretName: splunk-hec
      type: Opaque
      data:
        - objectName: splunk-hec-token
          key: SPLUNK_HEC_TOKEN
    - secretName: cloudflare-chatbot
      type: Opaque
      data:
        - objectName: cloudflare-tunnel-chatbot-token
          key: CLOUDFLARED_TOKEN
