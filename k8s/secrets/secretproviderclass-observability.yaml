# SecretProviderClass for observability workloads in kube-system.
# Mirrors the main money-honey SPC but synthesises only the secrets
# Fluent Bit + OTel Collector need. Kept separate because the CSI
# driver syncs K8s Secrets into the same namespace as the SPC, and
# Fluent Bit/OTel live in kube-system alongside Tetragon.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: observability-secrets
  namespace: kube-system
  labels:
    app: observability
    component: secrets
    part-of: money-honey
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: e4bd36bc-e409-447a-909e-9766114f9bb7
    keyvaultName: mh-kv-w8fxwb
    tenantId: 9e0af37d-04df-45ef-ab07-97960ca3edf5
    objects: |
      array:
        - |
          objectName: splunk-hec-token
          objectType: secret
  secretObjects:
    - secretName: splunk-hec
      type: Opaque
      data:
        - objectName: splunk-hec-token
          key: SPLUNK_HEC_TOKEN
