---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: kube-system
  labels:
    app: otel-collector
    component: observability
    part-of: money-honey
---
# RBAC so the Prometheus receiver inside OTel can discover Tetragon pods
# across kube-system for scraping.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
  labels:
    app: otel-collector
    component: observability
    part-of: money-honey
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
  labels:
    app: otel-collector
    component: observability
    part-of: money-honey
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: otel-collector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: kube-system
  labels:
    app: otel-collector
    component: observability
    part-of: money-honey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        component: observability
        part-of: money-honey
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.116.1
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/conf/otel-collector.yaml"
          env:
            - name: SPLUNK_HEC_HOST
              value: "10.0.4.4"
            # SPLUNK_HEC_TOKEN intentionally not exposed as env var —
            # OTel reads it directly from the CSI mount via token_file.
          ports:
            - name: metrics
              containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            # CSI mount triggers Secret sync for splunk-hec in kube-system.
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: otel-config
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: observability-secrets
