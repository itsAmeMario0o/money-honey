# Azure File share PVCs for the FastAPI backend.
# Uses the built-in 'azurefile' StorageClass so AKS dynamically
# provisions the file shares. No cluster-scoped PV needed, no
# extra RBAC required.
#
# The Terraform-created file shares (storage.tf) are not used by
# these PVCs. AKS creates its own shares in the MC_ resource group.
# To use the Terraform shares instead, switch to static PV binding
# with a cluster-admin role.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-base-pvc
  namespace: money-honey
  labels:
    app: fastapi
    component: storage
    part-of: money-honey
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc
  namespace: money-honey
  labels:
    app: fastapi
    component: storage
    part-of: money-honey
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile
  resources:
    requests:
      storage: 1Gi
