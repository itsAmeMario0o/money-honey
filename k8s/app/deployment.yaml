apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: money-honey
  labels:
    app: fastapi
    component: backend
    part-of: money-honey
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        component: backend
        part-of: money-honey
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: fastapi
          # Built + pushed in step 5. Until then, pods will ImagePullBackOff.
          image: ghcr.io/itsamemario0o/money-honey-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ALLOWED_ORIGINS
              value: "http://caddy"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-api-keys
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: money-honey-secrets
        - name: tmp
          emptyDir: {}
