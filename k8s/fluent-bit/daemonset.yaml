# Fluent Bit runs on every node so it can tail Tetragon's local file.
# Needs hostPath mount for /var/run/cilium/tetragon/ — same scope
# Tetragon itself uses.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app: fluent-bit
    component: observability
    part-of: money-honey
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app: fluent-bit
    component: observability
    part-of: money-honey
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        component: observability
        part-of: money-honey
    spec:
      serviceAccountName: fluent-bit
      # Tetragon writes its JSON log as root on the node. Log-collector
      # DaemonSets typically run as root with a read-only rootfs; that's
      # the posture we adopt here. Non-root options considered:
      # - CAP_DAC_READ_SEARCH — still needs privileged mode on most nodes
      # - fsGroup on the hostPath — hostPath doesn't honour fsGroup
      # - Tetragon logfile ownership change — Tetragon owns the file
      # Accepted trade-off: Fluent Bit runs as root, with read-only
      # rootfs, all caps dropped, and no privilege escalation.
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.10
          imagePullPolicy: IfNotPresent
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPLUNK_HEC_HOST
              # Substituted at deploy time; placeholder until the
              # Splunk VM is installed and its private IP known.
              value: "10.0.4.4"
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-hec
                  key: SPLUNK_HEC_TOKEN
          ports:
            - name: http
              containerPort: 2020
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: tetragon-logs
              mountPath: /var/run/cilium/tetragon
              readOnly: true
            - name: varlog
              mountPath: /var/log
            # CSI mount triggers the K8s-Secret sync for splunk-hec in
            # kube-system. Fluent Bit consumes SPLUNK_HEC_TOKEN from the
            # synced Secret via secretKeyRef above, not from this path.
            - name: kv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: tetragon-logs
          hostPath:
            path: /var/run/cilium/tetragon
            type: Directory
        - name: varlog
          emptyDir: {}
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: observability-secrets
      # Fluent Bit is in kube-system, not money-honey, so our
      # CiliumNetworkPolicy default-deny doesn't apply here. The pod
      # needs egress to Splunk HEC on the VM — covered by default
      # cluster networking since there's no CNP in kube-system.
