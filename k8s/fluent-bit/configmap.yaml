apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
  labels:
    app: fluent-bit
    component: observability
    part-of: money-honey
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

    [INPUT]
        Name              tail
        Path              /var/run/cilium/tetragon/tetragon.log
        Parser            json
        Tag               tetragon.*
        Read_from_Head    On
        Refresh_Interval  5
        DB                /var/log/fluent-bit-tetragon.db
        DB.Sync           Normal

    [FILTER]
        Name modify
        Match tetragon.*
        Add cluster money-honey-aks
        Add source tetragon

    [OUTPUT]
        Name          splunk
        Match         tetragon.*
        Host          ${SPLUNK_HEC_HOST}
        Port          8088
        TLS           On
        TLS.verify    Off
        Splunk_Token  ${SPLUNK_HEC_TOKEN}
        Splunk_Send_Raw  Off
        event_host    ${HOSTNAME}
        event_index   main
        event_sourcetype  tetragon:json

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
